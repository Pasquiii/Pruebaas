<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Hits TCG - Catálogo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-bottom: 2px solid #e63946; }
header h1 { font-size: 1.5rem; color: #fff; }
header h1 span { color: #e63946; }
.actions { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
.actions select, .actions input { padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 0.875rem; }
.actions select:focus, .actions input:focus { outline: none; border-color: #e63946; }
.btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.875rem; transition: all 0.2s; }
.btn-primary { background: #e63946; color: #fff; }
.btn-primary:hover { background: #c1121f; }
.btn-secondary { background: #2a2a4a; color: #e0e0e0; }
.btn-secondary:hover { background: #3a3a5a; }
.btn-success { background: #2d6a4f; color: #fff; }
.btn-success:hover { background: #1b4332; }
.btn-danger { background: #9b2226; color: #fff; }
.btn-danger:hover { background: #6a040f; }
.btn-warning { background: #e09f3e; color: #1a1a2e; }
.btn-warning:hover { background: #c17c2e; }

.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.stat-card { background: #1a1a2e; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid #2a2a4a; flex: 1; min-width: 120px; }
.stat-card h3 { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card p { font-size: 1.5rem; font-weight: 700; color: #fff; margin-top: 0.25rem; }

.filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.filters select, .filters input { padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 0.875rem; }
.filters select:focus, .filters input:focus { outline: none; border-color: #e63946; }
.filters label { font-size: 0.8rem; color: #888; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
.card { background: #1a1a2e; border-radius: 16px; overflow: hidden; border: 1px solid #2a2a4a; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.card-img { width: 100%; height: 220px; object-fit: cover; background: #2a2a4a; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.8rem; }
.card-body { padding: 1rem; }
.card-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #e63946; font-weight: 600; }
.card-title { font-size: 1.1rem; font-weight: 700; margin: 0.25rem 0 0.5rem; color: #fff; }
.card-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
.badge { padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
.badge-lang { background: #2a2a4a; color: #a8a8d0; }
.badge-price { background: #2d6a4f; color: #95d5b2; }
.card-desc { font-size: 0.85rem; color: #999; line-height: 1.4; margin-bottom: 0.75rem; }
.card-actions { display: flex; gap: 0.5rem; }
.card-actions .btn { flex: 1; text-align: center; font-size: 0.8rem; padding: 0.4rem 0.5rem; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal { background: #1a1a2e; border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 2rem; border: 1px solid #2a2a4a; }
.modal h2 { margin-bottom: 1.5rem; color: #fff; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.3rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.6rem 0.75rem; border-radius: 8px; border: 1px solid #333; background: #0f0f1a; color: #e0e0e0; font-size: 0.9rem; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #e63946; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

.empty-state { text-align: center; padding: 4rem 2rem; color: #555; }
.empty-state h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
.empty-state p { font-size: 0.9rem; }

.form-group input[type="file"] { padding: 0.4rem; font-size: 0.8rem; }
.form-group input[type="file"]::file-selector-button { background: #2a2a4a; color: #e0e0e0; border: none; padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer; margin-right: 0.5rem; }
.form-group input[type="file"]::file-selector-button:hover { background: #3a3a5a; }

.toast { position: fixed; bottom: 2rem; right: 2rem; background: #2d6a4f; color: #fff; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 600; z-index: 2000; opacity: 0; transform: translateY(20px); transition: all 0.3s; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: #9b2226; }

@media (max-width: 600px) {
  header { flex-direction: column; align-items: stretch; text-align: center; }
  .grid { grid-template-columns: 1fr; }
  .modal { padding: 1.5rem; }
}
</style>
</head>
<body>

<header>
  <h1>Fire <span>Hits</span> TCG</h1>
  <div class="actions">
    <button class="btn btn-primary" onclick="openModal()">+ Agregar Producto</button>
    <button class="btn btn-secondary" onclick="exportCSV()">Exportar CSV</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Importar CSV</button>
    <input type="file" id="importFile" accept=".csv" style="display:none" onchange="importCSV(event)">
  </div>
</header>

<div class="container">
  <div class="stats" id="stats"></div>

  <div class="filters">
    <label>Buscar: <input type="text" id="searchInput" placeholder="Nombre..." oninput="render()"></label>
    <label>Categoría: <select id="filterCategory" onchange="render()"><option value="">Todas</option></select></label>
    <label>Idioma: <select id="filterLang" onchange="render()"><option value="">Todos</option></select></label>
  </div>

  <div class="grid" id="catalogGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Editar Producto</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Categoría</label>
      <select id="editCategory">
        <option>Booster Box</option>
        <option>Blind Box</option>
        <option>Colección Especial</option>
        <option>Blister</option>
        <option>Bundle</option>
        <option>Mini Latas</option>
        <option>Accesorios</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nombre del producto</label>
      <input type="text" id="editName" required>
    </div>
    <div class="form-group">
      <label>Idioma</label>
      <select id="editLang">
        <option>Japonés</option>
        <option>Coreano</option>
        <option>Chino</option>
        <option>Español</option>
        <option>Inglés</option>
        <option>N/A</option>
      </select>
    </div>
    <div class="form-group">
      <label>Precio</label>
      <input type="text" id="editPrice" placeholder="$0,00">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="editDesc" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Imagen del producto</label>
      <input type="file" id="editImageFile" accept="image/*" onchange="previewImage(event)">
      <input type="hidden" id="editImage">
      <div id="imagePreview" style="margin-top:0.5rem; max-width:200px; border-radius:8px; overflow:hidden; display:none;">
        <img id="previewImg" style="width:100%; display:block; border-radius:8px;">
        <button class="btn btn-danger" style="width:100%; margin-top:0.25rem; font-size:0.75rem; padding:0.25rem;" onclick="removeImage()">Quitar imagen</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProduct()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'firehits_catalog';
let products = [];
let editingId = null;

const defaultProducts = [
  { id: 1, category: "Booster Box", name: "Mega Dream EX Booster Box", lang: "Japonés", price: "$110,00", desc: "10 packs por caja, 10 cartas por paquete", image: "" },
  { id: 2, category: "Booster Box", name: "Abyss Eye Booster Box", lang: "Japonés", price: "$145,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 3, category: "Booster Box", name: "Ninja Spinner Booster Box", lang: "Japonés", price: "$130,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 4, category: "Booster Box", name: "Terastal Festival Booster Box", lang: "Coreano", price: "$120,00", desc: "10 paquetes por caja, 10 tarjetas por paquete", image: "" },
  { id: 5, category: "Booster Box", name: "The Glory of Team Rocket Booster Box", lang: "Coreano", price: "$90,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 6, category: "Booster Box", name: "Heat Wave Arena Booster Box", lang: "Coreano", price: "$75,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 7, category: "Booster Box", name: "Mega - Ninja Spinner (Versión Coreana)", lang: "Coreano", price: "$75,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 8, category: "Booster Box", name: "Mega Brave Booster Box (Versión Coreana)", lang: "Coreano", price: "$150,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 9, category: "Booster Box", name: "Black Bolt Booster Box (Versión Coreana)", lang: "Coreano", price: "$85,00", desc: "20 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 10, category: "Booster Box", name: "Inferno X Booster Box (Versión Coreana)", lang: "Coreano", price: "$85,00", desc: "30 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 11, category: "Booster Box", name: "Black Crystal Blazing Booster Box", lang: "Chino", price: "$45,00", desc: "15 paquetes por caja, 5 tarjetas por paquete", image: "" },
  { id: 12, category: "Blind Box", name: "Nine Colors Gathering Card Case Keychain Blind Box", lang: "Chino", price: "$30,00", desc: "1 tarjeta promocional; 1 estuche con llavero; 1 paquete de refuerzo", image: "" },
  { id: 13, category: "Colección Especial", name: "Pikachu V-Union Gift Box", lang: "Chino", price: "$45,00", desc: "2 slim booster pack de Primordial Arts (Blastoise y Venusaur); 1 tarjeta Jumbo especial de conexión de Pikachu; 1 soporte de exhibición temático de Pikachu", image: "" },
  { id: 14, category: "Blind Box", name: "Brave Stars Card Case Keychain Blind Box", lang: "Chino", price: "$30,00", desc: "1 tarjeta promocional; 1 estuche con llavero; 1 paquete de refuerzo", image: "" },
  { id: 15, category: "Colección Especial", name: "First Partner 30th Aniversario", lang: "Chino", price: "$25,00", desc: "1 promo especial de ilustración rara; 1 estuche acrílico magnético; 1 slim booster pack", image: "" },
  { id: 16, category: "Booster Box", name: "Gem Pack Vol. 4 Booster Box", lang: "Chino", price: "$40,00", desc: "18 paquetes por caja, 4 tarjetas por paquete", image: "" },
  { id: 17, category: "Colección Especial", name: "First Partner S2 30th Aniversario", lang: "Chino", price: "$25,00", desc: "1 promocional de Charmander o Gastly; 1 hoja de pegatinas; 3 paquetes de Ascended Heroes", image: "" },
  { id: 18, category: "Blister", name: "Ascended Heroes 2 Pack Blister", lang: "Español", price: "$55,00", desc: "1 promocional de Larry's Komala; 1 moneda Pokémon con Larry; 2 paquetes de Ascended Heroes", image: "" },
  { id: 19, category: "Bundle", name: "Phantasmal Flames Booster Bundle", lang: "Español", price: "$58,00", desc: "6 paquetes de Phantasmal Flames", image: "" },
  { id: 20, category: "Bundle", name: "Destined Rivals Booster Bundle", lang: "Español", price: "$58,00", desc: "6 paquetes de Destined Rivals", image: "" },
  { id: 21, category: "Colección Especial", name: "First Partner Illustration Collection Series 1", lang: "Español", price: "$55,00", desc: "1 booster pack de 3 cartas promo; 2 booster packs; 1 sticker", image: "" },
  { id: 22, category: "Colección Especial", name: "Ascended Heroes Premium Poster Collection Mega Lucario", lang: "Español", price: "$115,00", desc: "1 promocional de aluminio con Mega Lucario ex; 1 póster; 10 paquetes de Ascended Heroes", image: "" },
  { id: 23, category: "Mini Latas", name: "Ascended Heroes Caja de 10 Mini Latas", lang: "Español", price: "$200,00", desc: "2 paquetes por mini lata, 10 cartas por paquete", image: "" },
  { id: 24, category: "Accesorios", name: "Carpetas / Portafolios (varios diseños)", lang: "N/A", price: "Consultar", desc: "Carpetas porta-cartas en varios diseños", image: "" },
  { id: 25, category: "Accesorios", name: "Combo Funda + Top Loader", lang: "N/A", price: "$0,30", desc: "(Precio por unidad) 1 top loader y 1 funda (sleeve)", image: "" }
];

function loadData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { products = JSON.parse(stored); } catch(e) { products = [...defaultProducts]; }
  } else {
    products = [...defaultProducts];
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

function getNextId() {
  return products.length ? Math.max(...products.map(p => p.id)) + 1 : 1;
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

function populateFilters() {
  const cats = [...new Set(products.map(p => p.category))];
  const langs = [...new Set(products.map(p => p.lang))];
  const catSel = document.getElementById('filterCategory');
  const langSel = document.getElementById('filterLang');
  const curCat = catSel.value;
  const curLang = langSel.value;
  catSel.innerHTML = '<option value="">Todas</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  langSel.innerHTML = '<option value="">Todos</option>' + langs.map(l => `<option value="${l}">${l}</option>`).join('');
  catSel.value = curCat;
  langSel.value = curLang;
}

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('filterCategory').value;
  const lang = document.getElementById('filterLang').value;

  const filtered = products.filter(p => {
    if (cat && p.category !== cat) return false;
    if (lang && p.lang !== lang) return false;
    if (search && !p.name.toLowerCase().includes(search)) return false;
    return true;
  });

  const total = products.length;
  const cats = [...new Set(products.map(p => p.category))].length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><h3>Total</h3><p>${total}</p></div>
    <div class="stat-card"><h3>Categorías</h3><p>${cats}</p></div>
    <div class="stat-card"><h3>Mostrando</h3><p>${filtered.length}</p></div>
  `;

  const grid = document.getElementById('catalogGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><h2>Sin resultados</h2><p>No hay productos que coincidan con los filtros.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card">
      ${p.image ? `<img class="card-img" src="${p.image}" alt="${p.name}" onerror="this.src='';this.style.background='#2a2a4a';this.style.display='flex';this.innerHTML='Sin imagen'">` : `<div class="card-img">Sin imagen</div>`}
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-title">${p.name}</div>
        <div class="card-meta">
          <span class="badge badge-lang">${p.lang}</span>
          <span class="badge badge-price">${p.price}</span>
        </div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-actions">
          <button class="btn btn-warning" onclick="openModal(${p.id})">Editar</button>
          <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Eliminar</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Editar Producto' : 'Nuevo Producto';
  document.getElementById('editImageFile').value = '';
  const preview = document.getElementById('imagePreview');
  preview.style.display = 'none';
  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('editId').value = p.id;
    document.getElementById('editCategory').value = p.category;
    document.getElementById('editName').value = p.name;
    document.getElementById('editLang').value = p.lang;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editDesc').value = p.desc;
    document.getElementById('editImage').value = p.image || '';
    if (p.image) {
      document.getElementById('previewImg').src = p.image;
      document.getElementById('imagePreview').style.display = 'block';
    } else {
      document.getElementById('imagePreview').style.display = 'none';
    }
  } else {
    document.getElementById('editId').value = '';
    document.getElementById('editCategory').value = 'Booster Box';
    document.getElementById('editName').value = '';
    document.getElementById('editLang').value = 'Japonés';
    document.getElementById('editPrice').value = '';
    document.getElementById('editDesc').value = '';
    document.getElementById('editImage').value = '';
    document.getElementById('imagePreview').style.display = 'none';
  }
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showToast('La imagen es muy grande (máx 2MB)', true);
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('editImage').value = e.target.result;
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('imagePreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  document.getElementById('editImage').value = '';
  document.getElementById('editImageFile').value = '';
  document.getElementById('imagePreview').style.display = 'none';
}

function saveProduct() {
  const id = document.getElementById('editId').value;
  const data = {
    category: document.getElementById('editCategory').value,
    name: document.getElementById('editName').value.trim(),
    lang: document.getElementById('editLang').value,
    price: document.getElementById('editPrice').value.trim(),
    desc: document.getElementById('editDesc').value.trim(),
    image: document.getElementById('editImage').value.trim()
  };
  if (!data.name) { showToast('El nombre es obligatorio', true); return; }

  if (id) {
    const idx = products.findIndex(p => p.id === Number(id));
    if (idx !== -1) products[idx] = { ...products[idx], ...data };
  } else {
    data.id = getNextId();
    products.push(data);
  }
  saveData();
  closeModal();
  render();
  showToast(id ? 'Producto actualizado' : 'Producto agregado');
}

function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  products = products.filter(p => p.id !== id);
  saveData();
  render();
  showToast('Producto eliminado');
}

function exportCSV() {
  const headers = ['Categoría','Nombre','Idioma','Precio','Descripción','Imagen'];
  const rows = products.map(p => [
    p.category,
    `"${p.name.replace(/"/g, '""')}"`,
    p.lang,
    p.price,
    `"${p.desc.replace(/"/g, '""')}"`,
    p.image
  ].join(';'));
  const csv = '\uFEFF' + headers.join(';') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Catalogo_Fire_Hits_TCG.csv';
  a.click();
  showToast('CSV exportado');
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) { showToast('CSV vacío o inválido', true); return; }
    const imported = [];
    for (let i = 1; i < lines.length; i++) {
      const parts = lines[i].split(';').map(s => s.replace(/^"|"$/g, '').trim());
      if (parts.length < 5) continue;
      imported.push({
        id: getNextId() + i,
        category: parts[0] || 'Sin categoría',
        name: parts[1] || 'Sin nombre',
        lang: parts[2] || 'N/A',
        price: parts[3] || '$0',
        desc: parts[4] || '',
        image: parts[5] || ''
      });
    }
    if (!imported.length) { showToast('No se encontraron datos válidos', true); return; }
    products = imported;
    saveData();
    populateFilters();
    render();
    showToast(`Importados ${imported.length} productos`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function init() {
  loadData();
  populateFilters();
  render();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
</body>
</html>
