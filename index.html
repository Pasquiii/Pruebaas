<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>ReupVz | Underground Resell</title>
    
    <style>
        /* Base Estética Underground con Fondo de Rayos Amarillo-Naranja */
        body {
            background-color: #050505;
            background-image: 
                /* Capa oscura para mantener el estilo Underground */
                linear-gradient(to right, rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.85)),
                /* Rayos inclinados 1 */
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 60px,
                    rgba(255, 215, 0, 0.15) 60px, /* Amarillo */
                    rgba(255, 140, 0, 0.3) 62px,  /* Naranja */
                    transparent 62px
                ),
                /* Rayos inclinados 2 cruzados */
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 100px,
                    rgba(255, 215, 0, 0.1) 100px, /* Amarillo suave */
                    rgba(255, 69, 0, 0.25) 103px, /* Naranja rojizo */
                    transparent 103px
                );
            background-attachment: fixed; /* Hace que el fondo no se mueva al hacer scroll */
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding-bottom: 80px; 
            overflow-x: hidden;
        }

        /* Cabecera (Header) Fija */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo-img {
            max-width: 80px;
            filter: invert(1);
        }

        /* Botón del Carrito en el Header */
        .cart-toggle-btn {
            background-color: transparent;
            color: #FF0000;
            border: 2px solid #FF0000;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-toggle-btn:hover {
            background-color: #FF0000;
            color: #fff;
        }

        .cart-badge {
            background-color: white;
            color: black;
            padding: 2px 8px;
            border-radius: 50%;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Icono SVG del carrito */
        .cart-icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Cinta de texto (Marquee) */
        .marquee {
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 3px solid #FF0000;
            padding: 10px 0;
            background-color: #000;
            color: #FF0000;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .marquee p {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Catálogo Grid */
        #catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de Producto */
        .producto {
            background-color: #121212;
            border: 2px solid #222;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .producto:hover {
            border-color: #FF0000;
        }

        .img-container {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #050505;
            margin-bottom: 15px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            transition: 0.2s;
        }

        .img-container:hover img {
            filter: hue-rotate(90deg) contrast(2);
            transform: scale(1.05);
        }

        .producto h3 {
            font-size: 1.1rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .precio {
            color: #FF0000;
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        /* Botón de Compra Brutalista */
        .btn-compra {
            background-color: #FF0000;
            color: white;
            border: 2px solid #FF0000;
            padding: 12px 0;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.1s;
        }

        .btn-compra:hover {
            background-color: transparent;
            color: #FF0000;
        }

        /* ----- CARRITO LATERAL (DRAWER) ----- */
        #cart-modal {
            display: none;
            position: fixed;
            top: 0; right: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: flex-end;
        }

        .cart-content {
            background-color: #0a0a0a;
            border-left: 4px solid #FF0000;
            width: 100%;
            max-width: 400px;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .cart-header h2 { margin: 0; color: #FF0000; }
        .close-cart { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding: 15px 0;
        }

        .cart-item-info h4 { margin: 0 0 5px 0; font-size: 0.9rem; }
        .cart-item-info p { margin: 0; color: #FF0000; font-weight: bold; }
        
        .btn-remove { background: #222; color: white; border: 1px solid #444; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; }
        .btn-remove:hover { background: #FF0000; border-color: #FF0000; }

        .cart-footer {
            margin-top: auto;
            border-top: 2px solid #222;
            padding-top: 20px;
        }

        .cart-total { display: flex; justify-content: space-between; font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; }

        .btn-whatsapp {
            background-color: #25D366; 
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-whatsapp:hover { background-color: #1ebe5d; }

        /* Footer con Panel de Control */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #000;
            border-top: 2px solid #222;
            padding: 10px;
            text-align: center;
            z-index: 40;
        }

        .btn-admin {
            background-color: #111;
            color: #555;
            border: 1px solid #333;
            padding: 5px 15px;
            font-family: monospace;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-admin:hover { color: #FF0000; border-color: #FF0000; }

        /* Modal Panel de Control */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .admin-content {
            background-color: #111;
            border: 2px solid #FF0000;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            color: white;
            text-align: left;
            max-height: 90vh;
            overflow-y: auto;
        }

        .admin-content h2 { margin-top: 0; color: #FF0000; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .admin-content label { display: block; margin-top: 15px; font-size: 0.9rem; color: #aaa;}
        .admin-content input {
            width: 100%; padding: 10px; margin-top: 5px;
            background-color: #000; border: 1px solid #444; color: white;
            box-sizing: border-box; font-family: monospace;
        }
        
        .admin-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { background-color: #FF0000; color: white; border: none; padding: 10px; flex: 1; cursor: pointer; font-weight: bold;}
        .btn-close { background-color: #333; color: white; border: none; padding: 10px; flex: 1; cursor: pointer; }
        .btn-download { background-color: #ffffff; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; text-transform: uppercase;}
    </style>
</head>
<body>

    <header>
        <img src="IMG_1846.jpeg" alt="Logo ReupVz" class="logo-img">
        <button class="cart-toggle-btn" onclick="toggleCart()">
            <svg class="cart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span id="cart-count" class="cart-badge">0</span>
        </button>
    </header>

    <div class="marquee">
        <p>🔥 NUEVO DROP 🔥 100% LEGIT 🔥 ENVÍOS A TODO EL PAÍS 🔥 PIEZAS ÚNICAS 🔥 REUPVZ</p>
    </div>

    <main id="catalogo"></main>

    <div id="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>TU CARRITO</h2>
                <button class="close-cart" onclick="toggleCart()">✖</button>
            </div>
            
            <div id="cart-items-container" style="flex-grow: 1; overflow-y: auto;">
                </div>

            <div class="cart-footer">
                <div class="cart-total">
                    <span>TOTAL:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button class="btn-whatsapp" onclick="checkoutWhatsApp()">PAGAR VÍA WHATSAPP</button>
            </div>
        </div>
    </div>

    <footer>
        <button class="btn-admin" onclick="accederPanel()">[ CONFIG ]</button>
    </footer>

    <div id="admin-panel">
        <div class="admin-content">
            <h2>⚙️ SISTEMA REUPVZ</h2>
            
            <label>WhatsApp de la Tienda (Ej: 584120000000):</label>
            <input type="text" id="cfg-whatsapp" placeholder="Número con código de país">

            <hr style="border-color: #333; margin: 25px 0;">

            <h2>🔥 AÑADIR PRENDA</h2>
            <label>Nombre de la Pieza:</label>
            <input type="text" id="prod-name" placeholder="Ej. Supreme Bogo Hoodie">
            
            <label>Precio ($):</label>
            <input type="number" id="prod-price" placeholder="Ej. 150">
            
            <label>Imagen (URL o Nombre de archivo):</label>
            <input type="text" id="prod-img" value="IMG_1846.jpeg" placeholder="Ej. foto1.png">

            <div class="admin-btns">
                <button class="btn-save" onclick="agregarProducto()">AÑADIR</button>
                <button class="btn-close" onclick="cerrarPanel()">CERRAR</button>
            </div>

            <button class="btn-download" onclick="downloadUpdatedHTML()">⬇️ GUARDAR Y DESCARGAR HTML</button>
        </div>
    </div>

    <script>
        // --- VARIABLES GLOBALES Y ANTI-CACHÉ ---
        const STORE_VERSION_TIMESTAMP = 1718000000000; 

        /* START_SETTINGS_JSON */
        let settings = {"whatsapp": "584120000000"};
        /* END_SETTINGS_JSON */

        // --- INVENTARIO DE PRODUCTOS ---
        /* START_PRODUCTS_ARRAY */
        const initialProducts = [
            { "id": 1, "name": "PRENDA DE PRUEBA UNDERGROUND", "price": 120, "img": "IMG_1846.jpeg" }
        ];
        /* END_PRODUCTS_ARRAY */

        let products = [...initialProducts];
        let cart = [];

        // --- RENDERIZADO DEL CATÁLOGO ---
        function renderCatalogo() {
            const catalogo = document.getElementById('catalogo');
            catalogo.innerHTML = "";

            products.forEach(p => {
                catalogo.innerHTML += `
                    <div class="producto">
                        <div>
                            <div class="img-container">
                                <img src="${p.img}" alt="${p.name}">
                            </div>
                            <h3>${p.name}</h3>
                            <div class="precio">$${p.price.toFixed(2)}</div>
                        </div>
                        <button class="btn-compra" onclick="addToCart(${p.id})">+ CARRITO</button>
                    </div>
                `;
            });
        }

        // --- LÓGICA DEL CARRITO ---
        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
            if(modal.style.display === 'flex') renderCart();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push(product);
                updateCartCount();
                alert(`🔥 ${product.name} añadido al carrito.`);
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            renderCart();
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            container.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p style='color:#666; text-align:center; margin-top:50px;'>El carrito está vacío.</p>";
            } else {
                cart.forEach((item, index) => {
                    total += parseFloat(item.price);
                    container.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <h4>${item.name}</h4>
                                <p>$${parseFloat(item.price).toFixed(2)}</p>
                            </div>
                            <button class="btn-remove" onclick="removeFromCart(${index})">QUITAR</button>
                        </div>
                    `;
                });
            }
            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) {
                alert("Agrega artículos al carrito primero.");
                return;
            }

            let text = "🔥 *NUEVA ORDEN - REUPVZ* 🔥\n\n";
            let total = 0;

            cart.forEach(item => {
                text += `▪️ ${item.name} - $${item.price}\n`;
                total += parseFloat(item.price);
            });

            text += `\n*TOTAL: $${total.toFixed(2)}*`;

            const encodedText = encodeURIComponent(text);
            const waLink = `https://wa.me/${settings.whatsapp}?text=${encodedText}`;
            window.open(waLink, '_blank');
        }

        // --- LÓGICA DEL PANEL ADMIN ---
        function accederPanel() {
            let pass = prompt("Contraseña de Acceso (Por defecto: reupvz123):");
            if (pass === "reupvz123") {
                document.getElementById('cfg-whatsapp').value = settings.whatsapp;
                document.getElementById('admin-panel').style.display = 'flex';
            } else if (pass !== null) {
                alert("Acceso Denegado 🛑");
            }
        }

        function cerrarPanel() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        function agregarProducto() {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            let img = document.getElementById('prod-img').value;

            if (!name || !price) {
                alert("Faltan datos de la prenda.");
                return;
            }

            if(!img) img = "IMG_1846.jpeg";

            const newId = Date.now();
            products.push({ id: newId, name: name, price: parseFloat(price), img: img });
            
            renderCatalogo();
            alert("🔥 Prenda añadida al catálogo.");
            
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-price').value = "";
        }

        // --- SISTEMA DE HORNEADO (BAKING) Y ANTI-CACHÉ ---
        function downloadUpdatedHTML() {
            // Actualizar configuraciones antes de guardar
            settings.whatsapp = document.getElementById('cfg-whatsapp').value.replace(/\D/g,'') || settings.whatsapp;

            // 1. Ocultar panel antes de descargar
            cerrarPanel();

            // 2. Extraer todo el HTML
            let htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;

            // 3. Generar nuevo Timestamp Anti-Caché
            const newVersion = Date.now();
            htmlContent = htmlContent.replace(/const STORE_VERSION_TIMESTAMP = \d+;/, `const STORE_VERSION_TIMESTAMP = ${newVersion};`);

            // 4. Inyectar configuraciones
            const settingsStr = JSON.stringify(settings);
            const regexSettings = /\/\* START_SETTINGS_JSON \*\/[\s\S]*?\/\* END_SETTINGS_JSON \*\//;
            htmlContent = htmlContent.replace(regexSettings, `/* START_SETTINGS_JSON */\n        let settings = ${settingsStr};\n        /* END_SETTINGS_JSON */`);

            // 5. Inyectar productos permanentemente
            const productsJSON = JSON.stringify(products, null, 4);
            const regex = /\/\* START_PRODUCTS_ARRAY \*\/[\s\S]*?\/\* END_PRODUCTS_ARRAY \*\//;
            htmlContent = htmlContent.replace(regex, `/* START_PRODUCTS_ARRAY */\n        const initialProducts = ${productsJSON};\n        /* END_PRODUCTS_ARRAY */`);

            // 6. Descargar el archivo
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Inicializar
        window.onload = function() {
            renderCatalogo();
        };
    </script>
</body>
</html>
